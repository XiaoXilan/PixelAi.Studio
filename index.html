<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelGen Studio Ultimate v2</title>
    <!-- Menghubungkan ke file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>PIXELGEN STUDIO v2</h1>
        <input type="text" id="promptInput" placeholder="Contoh: warrior idle pose, magic sword...">
        
        <div class="presets">
            <button class="preset-btn active" onclick="setPreset(16, this)">16x16</button>
            <button class="preset-btn" onclick="setPreset(32, this)">32x32</button>
            <button class="preset-btn" onclick="setPreset(64, this)">64x64</button>
        </div>

        <button class="main-btn" onclick="generatePixelArt()">GENERATE ASSET</button>

        <div class="preview-box">
            <span id="loadingText" class="loading">GENERATING PIXELS...</span>
            <img id="resultImage" src="" style="display:none;" alt="Pixel Asset">
            <div id="gridOverlay" class="grid-overlay"></div>
        </div>

        <div class="control-row">
            <button id="gridToggle" class="sub-btn" onclick="toggleGrid()">GRID: OFF</button>
            <button class="sub-btn" onclick="downloadImage()">DOWNLOAD</button>
        </div>
    </div>

    <!-- Menghubungkan ke file JavaScript eksternal -->
    <script src="script.js"></script>
</body>
</html>
