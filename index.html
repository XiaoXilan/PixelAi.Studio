<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelGen Studio Ultimate v2</title>
    <style>
        /* Cyberpunk Dark Mode Style */
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1f2833;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #45f3ff;
            box-shadow: 0 0 15px #45f3ff;
            box-sizing: border-box;
        }
        h1 {
            color: #45f3ff;
            text-align: center;
            text-shadow: 0 0 5px #45f3ff;
            font-size: 22px;
            margin-top: 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0b0c10;
            border: 1px solid #66fcf1;
            color: #fff;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .presets {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 5px;
        }
        .preset-btn {
            background: #0b0c10;
            color: #66fcf1;
            border: 1px solid #66fcf1;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            flex: 1;
            font-weight: bold;
            transition: 0.2s;
        }
        .preset-btn.active {
            background: #66fcf1;
            color: #0b0c10;
            box-shadow: 0 0 8px #66fcf1;
        }
        button.main-btn {
            width: 100%;
            padding: 14px;
            background: #ff007f;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 10px #ff007f;
            transition: 0.2s;
        }
        .preview-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            margin-top: 20px;
            background: #0b0c10;
            border: 2px dashed #66fcf1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Trik CSS biar piksel gambar tetap tajam & kotak-kotak di HP/Unity */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        /* Grid Transparan Otomatis */
        .grid-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-size: 6.25% 6.25%; /* Default 16x16 */
            background-image: 
                linear-gradient(to right, rgba(69, 243, 255, 0.25) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(69, 243, 255, 0.25) 1px, transparent 1px);
        }
        .grid-overlay.active {
            display: block;
        }
        .control-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .sub-btn {
            flex: 1;
            padding: 10px;
            background: #1f2833;
            color: #66fcf1;
            border: 1px solid #66fcf1;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
        .sub-btn.active {
            background: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 5px #45f3ff;
        }
        .loading {
            color: #ff007f;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 5px #ff007f;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PIXELGEN STUDIO v2</h1>
        <input type="text" id="promptInput" placeholder="Contoh: warrior idle pose, magic sword...">
        
        <div class="presets">
            <button class="preset-btn active" onclick="setPreset(16, this)">16x16</button>
            <button class="preset-btn" onclick="setPreset(32, this)">32x32</button>
            <button class="preset-btn" onclick="setPreset(64, this)">64x64</button>
        </div>

        <button class="main-btn" onclick="generatePixelArt()">GENERATE ASSET</button>

        <div class="preview-box">
            <span id="loadingText" class="loading">GENERATING PIXELS...</span>
            <img id="resultImage" src="" style="display:none;" alt="Pixel Asset">
            <div id="gridOverlay" class="grid-overlay"></div>
        </div>

        <div class="control-row">
            <button id="gridToggle" class="sub-btn" onclick="toggleGrid()">GRID: OFF</button>
            <button class="sub-btn" onclick="downloadImage()">DOWNLOAD</button>
        </div>
    </div>

    <script>
        let currentSize = 16;

        function setPreset(size, btn) {
            currentSize = size;
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Mengubah ukuran grid kotak secara dinamis otomatis
            const overlay = document.getElementById('gridOverlay');
            const percentage = 100 / size;
            overlay.style.backgroundSize = `${percentage}% ${percentage}%`;
        }

        function toggleGrid() {
            const overlay = document.getElementById('gridOverlay');
            const btn = document.getElementById('gridToggle');
            overlay.classList.toggle('active');
            
            if(overlay.classList.contains('active')) {
                btn.innerText = "GRID: ON";
                btn.classList.add('active');
            } else {
                btn.innerText = "GRID: OFF";
                btn.classList.remove('active');
            }
        }

        function generatePixelArt() {
            const prompt = document.getElementById('promptInput').value;
            if(!prompt) return alert('Ketik prompt asset-nya dulu ya!');

            const loadingText = document.getElementById('loadingText');
            const resultImage = document.getElementById('resultImage');

            loadingText.style.display = 'block';
            resultImage.style.display = 'none';

            // Memaksa AI menghasilkan pixel art murni sesuai preset ukuran
            const styleModifier = `, standalone 2d game asset, pixel art style, ${currentSize}x${currentSize} resolution vibe, crisp outline, dark background`;
            const finalPrompt = encodeURIComponent(prompt + styleModifier);
            
            // Menggunakan Engine AI Generator gratis & cepat
            const randomSeed = Math.floor(Math.random() * 99999);
            const apiUrl = `https://image.pollinations.ai/prompt/${finalPrompt}?width=512&height=512&nologo=true&seed=${randomSeed}`;

            resultImage.src = apiUrl;

            resultImage.onload = function() {
                loadingText.style.display = 'none';
                resultImage.style.display = 'block';
            };
        }

        function downloadImage() {
            const img = document.getElementById('resultImage');
            if(!img.src || img.style.display === 'none') return alert('Belum ada gambar yang dibuat!');
            
            // Membuka tab baru agar mudah di-save di HP
            window.open(img.src, '_blank');
        }
    </script>
</body>
</html>
